services:
  nominatim:
    image: ${NOMINATIM_IMAGE:-mediagis/nominatim:5.3}
    container_name: dados-tabulares-nominatim
    restart: unless-stopped
    shm_size: ${NOMINATIM_SHM_SIZE:-1gb}
    ports:
      - "${NOMINATIM_HTTP_PORT:-8088}:8080"
    environment:
      PBF_PATH: ${NOMINATIM_PBF_PATH:-/nominatim/data/parana-latest.osm.pbf}
      THREADS: ${NOMINATIM_THREADS:-8}
      FREEZE: ${NOMINATIM_FREEZE:-true}
      NOMINATIM_TOKENIZER: ${NOMINATIM_TOKENIZER:-icu}
      NOMINATIM_PASSWORD: ${NOMINATIM_PASSWORD:?set NOMINATIM_PASSWORD in infra/nominatim/.env}
    volumes:
      - nominatim_data:/var/lib/postgresql
      - ./project:/nominatim
      - ./data:/nominatim/data:ro

volumes:
  nominatim_data:
