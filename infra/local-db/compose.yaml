services:
  postgres:
    image: postgis/postgis:17-3.5
    container_name: dados-tabulares-local-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dados_publicos_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - dados_tabulares_postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dados_publicos_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dados_tabulares_postgres_data:
